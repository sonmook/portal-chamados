{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Colaborador - Portal de TI</title>
    
    <link rel="icon" href="{% static 'img/favicon.png' %}" type="image/png">    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        /* Estilização para garantir consistência visual no formulário gerado pelo Django */
        form input[type="text"], 
        form input[type="email"], 
        form select {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            color: #212529;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        form input:focus, form select:focus {
            outline: 0;
            border-color: #0d6efd;
            background-color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
    </style>
</head>
<body class="bg-light py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                
                <div class="mb-4">
                    <a href="{% url 'gerenciar_usuarios' %}" class="text-decoration-none text-muted small fw-bold">
                        &larr; VOLTAR AO GERENCIAMENTO
                    </a>
                </div>

                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white py-3 d-flex align-items-center justify-content-center gap-2">
                        <i class="bi bi-pencil-square fs-5"></i>
                        <h5 class="m-0 fw-bold">Editar Colaborador: {{ usuario.username }}</h5>
                    </div>
                    
                    <div class="card-body p-4">
                        <form method="POST">
                            {% csrf_token %}
                            
                            <div class="row g-3">
                                <div class="col-12">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Nome de Usuário</label>
                                    {{ form.username }}
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Primeiro Nome</label>
                                    {{ form.first_name }}
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Sobrenome</label>
                                    {{ form.last_name }}
                                </div>

                                <div class="col-12">
                                    <label class="form-label small fw-bold text-uppercase text-muted">Nível de Acesso <span class="text-danger">*</span></label>
                                    {{ form.nivel_acesso }}
                                </div>

                                <div class="col-12">
                                    <label class="form-label small fw-bold text-uppercase text-muted">E-mail Corporativo</label>
                                    {{ form.email }}
                                </div>
                                
                                <hr class="my-3 text-muted">

                                <div class="col-12">
                                    <div class="form-check form-switch p-3 bg-light border rounded">
                                        {{ form.is_active }}
                                        <label class="form-check-label fw-bold ms-2 text-dark" for="{{ form.is_active.id_for_label }}">
                                            Permitir acesso ao sistema (Usuário Ativo)
                                        </label>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-4">
                                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                                    <i class="bi bi-floppy"></i> SALVAR ALTERAÇÕES
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
                
            </div>
        </div>
    </div>

</body>
</html>
